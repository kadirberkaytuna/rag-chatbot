<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #EEF1F4;
    --panel: #FFFFFF;
    --ink: #171A21;
    --muted: #5B6572;
    --line: #DDE2E8;
    --accent: #0F766E;
    --accent-ink: #0B5A54;
    --accent-soft: #DCF0ED;
    --error: #B4462F;
    --display: 'Space Grotesk', system-ui, sans-serif;
    --body: 'Inter', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--body);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header { margin-bottom: 36px; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent-ink);
    margin: 0 0 12px;
  }

  h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(30px, 6vw, 44px);
    letter-spacing: -0.02em;
    margin: 0 0 10px;
  }

  .lede {
    color: var(--muted);
    font-size: 16px;
    max-width: 56ch;
    margin: 0;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .step {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 16px;
  }

  .step b {
    color: var(--accent-ink);
    background: var(--accent-soft);
    border-radius: 4px;
    padding: 1px 7px;
    font-weight: 600;
  }

  .row { display: flex; gap: 10px; flex-wrap: wrap; }

  input[type="text"], .file-label {
    font-family: var(--body);
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 12px 14px;
    background: #fff;
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type="text"] { flex: 1; min-width: 0; }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .file-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    color: var(--muted);
    flex: 1;
    min-width: 0;
  }

  .file-label:hover { border-color: var(--accent); }
  .file-label span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-label input { display: none; }

  .chip {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 2px 8px;
    color: var(--accent-ink);
    flex-shrink: 0;
  }

  button {
    font-family: var(--body);
    font-weight: 600;
    font-size: 15px;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 9px;
    padding: 12px 22px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }

  button:hover:not(:disabled) { background: var(--accent-ink); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    font-family: var(--mono);
    font-size: 13px;
    margin-top: 14px;
    min-height: 18px;
    color: var(--muted);
  }
  .status.ok { color: var(--accent-ink); }
  .status.err { color: var(--error); }

  .thread { display: flex; flex-direction: column; gap: 18px; }
  .thread:empty { display: none; }

  .turn { display: flex; flex-direction: column; gap: 8px; }

  .q {
    font-family: var(--body);
    font-weight: 600;
    font-size: 15px;
  }
  .q::before {
    content: "You asked";
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .a {
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 16px;
    color: var(--ink);
    font-size: 15px;
    white-space: pre-wrap;
  }
  .a::before {
    content: "Answer, grounded in your documents";
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-ink);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .a.thinking { color: var(--muted); font-style: italic; }

  .dots::after {
    content: "";
    animation: dots 1.4s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ""; }
    25% { content: "."; }
    50% { content: ".."; }
    75% { content: "..."; }
  }

  .hint {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 18px;
    text-align: center;
  }

  @media (prefers-reduced-motion: reduce) {
    .dots::after { animation: none; content: "..."; }
    button:active:not(:disabled) { transform: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">Retrieval-Augmented Generation</p>
      <h1>RAG Chatbot</h1>
      <p class="lede">Upload a document, then ask questions about it. Answers are drawn only from what you upload, not from the model's general knowledge.</p>
    </header>

    <section class="card">
      <p class="step"><b>1</b> Add a document</p>
      <div class="row">
        <label class="file-label">
          <span id="fileName">Choose a PDF or TXT file</span>
          <input type="file" id="fileInput" accept=".pdf,.txt" />
        </label>
        <button id="uploadBtn">Upload</button>
      </div>
      <div class="status" id="uploadStatus"></div>
    </section>

    <section class="card">
      <p class="step"><b>2</b> Ask a question</p>
      <div class="row">
        <input type="text" id="questionInput" placeholder="What is this document about?" />
        <button id="askBtn">Ask</button>
      </div>
      <div class="status" id="askStatus"></div>
    </section>

    <section class="thread" id="thread"></section>

    <p class="hint">Runs locally by default. The active model is set in application.yaml.</p>
  </div>

<script>
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const uploadBtn = document.getElementById('uploadBtn');
  const uploadStatus = document.getElementById('uploadStatus');
  const questionInput = document.getElementById('questionInput');
  const askBtn = document.getElementById('askBtn');
  const askStatus = document.getElementById('askStatus');
  const thread = document.getElementById('thread');

  fileInput.addEventListener('change', () => {
    fileName.textContent = fileInput.files.length
      ? fileInput.files[0].name
      : 'Choose a PDF or TXT file';
  });

  function setStatus(el, msg, kind) {
    el.textContent = msg;
    el.className = 'status' + (kind ? ' ' + kind : '');
  }

  uploadBtn.addEventListener('click', async () => {
    if (!fileInput.files.length) {
      setStatus(uploadStatus, 'Select a file first.', 'err');
      return;
    }
    const data = new FormData();
    data.append('file', fileInput.files[0]);

    uploadBtn.disabled = true;
    setStatus(uploadStatus, 'Uploading and indexing...', '');
    try {
      const res = await fetch('/api/upload', { method: 'POST', body: data });
      const text = await res.text();
      if (!res.ok) throw new Error(text || ('HTTP ' + res.status));
      setStatus(uploadStatus, text, 'ok');
    } catch (err) {
      setStatus(uploadStatus, 'Upload failed: ' + err.message, 'err');
    } finally {
      uploadBtn.disabled = false;
    }
  });

  async function ask() {
    const question = questionInput.value.trim();
    if (!question) {
      setStatus(askStatus, 'Type a question first.', 'err');
      return;
    }

    const turn = document.createElement('div');
    turn.className = 'turn';
    const q = document.createElement('div');
    q.className = 'q';
    q.textContent = question;
    const a = document.createElement('div');
    a.className = 'a thinking';
    a.innerHTML = '<span class="dots">Thinking</span>';
    turn.appendChild(q);
    turn.appendChild(a);
    thread.prepend(turn);

    questionInput.value = '';
    askBtn.disabled = true;
    setStatus(askStatus, '', '');

    const data = new FormData();
    data.append('question', question);
    try {
      const res = await fetch('/api/chat', { method: 'POST', body: data });
      const text = await res.text();
      if (!res.ok) throw new Error(text || ('HTTP ' + res.status));
      a.className = 'a';
      a.textContent = text;
    } catch (err) {
      a.className = 'a';
      a.style.borderColor = 'var(--error)';
      a.textContent = 'Could not get an answer: ' + err.message;
    } finally {
      askBtn.disabled = false;
      questionInput.focus();
    }
  }

  askBtn.addEventListener('click', ask);
  questionInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') ask();
  });
</script>
</body>
</html>
