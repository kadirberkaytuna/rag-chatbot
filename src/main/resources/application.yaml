spring:
  application:
    name: rag-chatbot
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: raguser
    password: ragpass

langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: llama3.2:3b
      temperature: 0.7
      timeout: PT120S
      rag:
        content-retriever:
          embedding-store: enabled